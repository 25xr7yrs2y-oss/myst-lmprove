name: Fix Release
on: workflow_dispatch

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact and upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download artifact from run 26097454503
          gh api /repos/25xr7yrs2y-oss/myst-lmprove/actions/artifacts/7083612918/zip > myst-windows-custom.zip
          # Upload to release v1.0.0
          gh release upload v1.0.0 myst-windows-custom.zip --repo 25xr7yrs2y-oss/myst-lmprove --clobber
